<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>足迹 · FOOTPRINT</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;700&family=Source+Serif+4:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
</head>
<body class="theme-survey" style="font-family: sans-serif">

<div id="map"></div>

<!-- ═══ MAP TILE TOGGLE ═══ -->
<div class="map-lang-toggle" id="map-lang-toggle">
  <button class="mlt-btn active" data-lang="zh">中文</button>
  <button class="mlt-btn" data-lang="en">EN</button>
</div>

<!-- ═══ TOPBAR ═══ -->
<header class="topbar">
  <div class="brand">
    <div class="brand-mark">FP</div>
    <div class="brand-text">
      <div class="brand-title">足迹</div>
      <div class="brand-sub">FOOTPRINT // ATLAS</div>
    </div>
  </div>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="search" id="search" placeholder="搜索地点 / 感想 / 轨迹…" autocomplete="off"/>
    <span class="search-kbd">/</span>
    <div class="search-results" id="search-results"></div>
  </div>

  <div class="tools">
    <button class="t-btn" id="tool-list" title="列表">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
      <span class="lbl">列表</span>
    </button>
    <button class="t-btn" id="tool-timeline" title="时间线">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><path d="M6 8v8M11 6h10M11 18h10M11 12h10"/></svg>
      <span class="lbl">时间线</span>
    </button>
    <button class="t-btn" id="tool-new-trip" title="新建轨迹">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><path d="M12 7v6M9 10h6"/></svg>
      <span class="lbl">新轨迹</span>
    </button>
    <button class="t-btn icon-only" id="tool-import" title="导入">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
    </button>
    <button class="t-btn icon-only" id="tool-export" title="导出 (建议定期备份)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
    </button>
    <button class="t-btn icon-only" id="dark-toggle" title="深浅切换">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
  </div>
</header>
<input type="file" id="import-input" accept=".json" style="display:none"/>

<!-- ═══ STATS PILL ═══ -->
<div class="stats">
  <div class="stat">
    <span class="stat-num" id="stat-prov">0</span>
    <span class="stat-lbl">PROV</span>
  </div>
  <div class="stat">
    <span class="stat-num" id="stat-entries">0</span>
    <span class="stat-lbl">SITES</span>
  </div>
  <div class="stat">
    <span class="stat-num" id="stat-km">0</span>
    <span class="stat-lbl">KM</span>
  </div>
</div>

<!-- ═══ LEFT PANEL — LIST ═══ -->
<aside class="panel left" id="list-panel">
  <div class="corner tl"></div>
  <div class="corner bl"></div>
  <div class="panel-head">
    <div>
      <h2>足迹管理</h2>
      <div class="sub">MANAGER</div>
    </div>
    <button class="icon-btn" data-close-panel="list" aria-label="close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="panel-body" id="list-body"></div>
</aside>

<!-- ═══ RIGHT PANEL — DETAIL / FORM ═══ -->
<aside class="panel right" id="detail-panel">
  <div class="corner tr"></div>
  <div class="corner br"></div>
  <div class="panel-head" id="detail-head">
    <div>
      <h2>记录足迹</h2>
      <div class="sub" id="detail-sub">NEW ENTRY</div>
    </div>
    <button class="icon-btn" data-close-panel="detail" aria-label="close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="panel-body" id="detail-body"></div>
</aside>

<!-- ═══ TIMELINE OVERLAY ═══ -->
<div class="timeline-overlay" id="timeline">
  <div class="timeline-head">
    <div>
      <div class="timeline-title">时间线</div>
      <div class="timeline-sub">CHRONOLOGY // BY YEAR</div>
    </div>
    <button class="icon-btn" data-close-panel="timeline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="timeline-body" id="timeline-body"></div>
</div>

<!-- ═══ MODAL ═══ -->
<div class="modal-mask" id="modal">
  <div class="modal">
    <div class="corner tl"></div>
    <div class="corner br"></div>
    <div class="modal-head">
      <h3 id="modal-title">新建轨迹</h3>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<!-- ═══ TOAST ═══ -->
<div class="toast" id="toast"></div>

<!-- ═══ TWEAKS ═══ -->
<button class="tweaks-toggle" id="tweaks-toggle" aria-label="tweaks">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/>
  </svg>
</button>
<div class="tweaks-panel" id="tweaks-panel">
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="panel-head">
    <div>
      <h2>调试</h2>
      <div class="sub">TWEAKS // 3 DIRECTIONS</div>
    </div>
    <button class="icon-btn" data-close-panel="tweaks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="tweaks-body" id="tweaks-body"></div>
</div>

<script src="app.js"></script>
</body>
</html>
